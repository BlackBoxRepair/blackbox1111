<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>黑盒子維修中心 - 官方網站</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-black: #1a1a1a;
            --secondary-black: #2d2d2d;
            --gold-accent: #d4af37;
            --bg-light: #f9f9f9;
            --text-dark: #333333;
            --text-muted: #999999;
            --shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            --transition: all 0.3s ease;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Noto Sans TC', sans-serif; }
        body { background-color: var(--bg-light); color: var(--text-dark); line-height: 1.6; }

        /* --- 導覽列 --- */
        header {
            position: fixed; top: 0; left: 0; width: 100%; height: 75px; /* 稍微拉高 5px 讓大 Logo 有呼吸空間 */
            background-color: #ffffff; box-shadow: var(--shadow);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 24px; z-index: 1000;
        }
        .header-left { display: flex; align-items: center; gap: 15px; }
        .menu-toggle { font-size: 24px; color: var(--primary-black); cursor: pointer; background: none; border: none; }
        
        /* 修改：網站上排 Logo 再度放大 */
        .logo-img { height: 48px; width: auto; object-fit: contain; display: block; }

        .header-right { display: flex; gap: 15px; }
        .nav-btn {
            display: flex; justify-content: center; align-items: center;
            width: 42px; height: 42px; border-radius: 50%;
            background-color: var(--primary-black); color: #ffffff;
            text-decoration: none; font-size: 18px; transition: var(--transition);
        }
        .nav-btn:hover { background-color: var(--gold-accent); transform: translateY(-2px); }

        /* --- 側邊選單 --- */
        .sidebar {
            position: fixed; top: 0; left: -320px; width: 320px; height: 100%;
            background-color: #ffffff; z-index: 2000; transition: var(--transition);
            padding: 24px; box-shadow: 5px 0 25px rgba(0,0,0,0.05);
            display: flex; flex-direction: column;
        }
        .sidebar.active { left: 0; }
        .sidebar-header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 20px; margin-bottom: 20px; border-bottom: 1px solid #f0f0f0; }
        
        /* 修改：左側選單上方 Logo 再度放大 */
        .sidebar-logo { height: 44px; width: auto; object-fit: contain; display: block; }
        
        .close-btn { font-size: 20px; background: none; border: none; cursor: pointer; }

        .sidebar-content { display: flex; flex-direction: column; gap: 24px; }
        .menu-group { display: flex; flex-direction: column; gap: 8px; }
        .group-title { font-size: 13px; color: var(--text-muted); letter-spacing: 1px; padding-left: 8px; }
        .menu-item { color: var(--text-dark); text-decoration: none; font-size: 16px; padding: 8px; border-radius: 6px; transition: var(--transition); cursor: pointer; }
        .menu-item:hover { color: var(--gold-accent); background-color: #fcfbf7; padding-left: 14px; }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.3); z-index: 1500; display: none; }
        .overlay.active { display: block; }

        /* --- 頁面內容切換核心 --- */
        main { 
            margin-top: 75px; /* 配合導覽列高度同步微調 */
            padding: 5px 20px 40px 20px; 
            max-width: 1200px; 
            margin-left: auto; 
            margin-right: auto; 
            min-height: calc(100vh - 180px); 
        }
        
        .content-section { display: none; animation: fadeIn 0.4s ease forwards; }
        .content-section.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- 共用容器樣式 --- */
        .page-container { 
            background: transparent; 
            padding: 15px 0 20px 0; 
            text-align: center; 
        }

        .page-header { 
            font-size: 28px; 
            font-weight: 700; 
            margin-bottom: 6px; 
            text-align: center; 
            color: var(--primary-black); 
        }

        /* 服務流程按鈕排版 */
        .process-tabs { 
            display: flex; 
            justify-content: center; 
            gap: 8px; 
            margin-bottom: 20px; 
            flex-wrap: nowrap; 
        }
        
        .tab-btn { 
            background: var(--primary-black); 
            color: #fff; 
            border: 2px solid var(--primary-black); 
            padding: 6px 14px; 
            font-size: 18px; 
            border-radius: 40px; 
            cursor: pointer; 
            transition: var(--transition); 
            letter-spacing: 1px;
            white-space: nowrap; 
        }
        .tab-btn.active { border-color: var(--gold-accent); color: var(--gold-accent); font-weight: 700; box-shadow: 0 4px 15px rgba(212, 175, 55, 0.15); }
        .tab-btn:hover { transform: translateY(-2px); background-color: var(--secondary-black); }

        /* 圖片外框維持 600px */
        .img-box { max-width: 600px; margin: 0 auto; }
        .display-img { width: 100%; height: auto; display: none; }
        .display-img.active { display: block; animation: fadeIn 0.4s; }

        /* --- 💎 價格查詢 菱形按鈕排版區 --- */
        .diamond-tabs-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 50px;
            margin-top: 30px;
        }

        .diamond-row {
            display: flex;
            justify-content: center;
            gap: 32px; 
        }

        .diamond-row.bottom {
            margin-top: -12px; 
        }

        .diamond-btn {
            width: 50px;  
            height: 50px; 
            background-color: var(--primary-black);
            transform: rotate(45deg);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            border: 2px solid transparent;
            transition: var(--transition);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .diamond-btn .btn-content {
            transform: rotate(-45deg); 
            display: flex;
            justify-content: center;
            align-items: center;
            width: 24px;
            height: 24px;
        }

        .diamond-btn i {
            color: #ffffff;
            font-size: 24px; 
        }

        .diamond-btn svg {
            width: 24px;
            height: 24px;
            fill: #ffffff;
            transition: var(--transition);
        }

        .diamond-btn:hover {
            transform: rotate(45deg) scale(1.05);
            background-color: var(--secondary-black);
        }

        .diamond-btn.active {
            border-color: var(--gold-accent);
            background-color: var(--primary-black);
        }

        .diamond-btn.active i {
            color: var(--gold-accent);
        }

        .diamond-btn.active svg {
            fill: var(--gold-accent);
        }

        /* --- 其他樣式 --- */
        .empty-state { text-align: center; padding: 100px 0; color: var(--text-muted); }

        footer { text-align: center; padding: 40px; color: var(--text-gray); font-size: 14px; }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <button class="menu-toggle" id="openMenu"><i class="fa-solid fa-bars"></i></button>
            <div class="logo-container"><img src="site logo.png" alt="Logo" class="logo-img"></div>
        </div>
        <div class="header-right">
            <a href="https://blackboxrepair.github.io/membership/" class="nav-btn"><i class="fa-solid fa-user"></i></a>
            <a href="https://blackboxrepair.github.io/bookingonline/" class="nav-btn"><i class="fa-solid fa-calendar-check"></i></a>
        </div>
    </header>

    <div class="overlay" id="overlay"></div>
    <nav class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <img src="site logo.png" class="sidebar-logo">
            <button class="close-btn" id="closeMenu"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="sidebar-content">
            <div class="menu-group">
                <div class="menu-item" onclick="navigateTo('home')">首頁</div>
            </div>
            <div class="menu-group">
                <div class="group-title">服務項目</div>
                <div class="menu-item" onclick="navigateTo('process')">服務流程</div>
                <div class="menu-item" onclick="navigateTo('prices')">價格查詢</div>
            </div>
            <div class="menu-group">
                <div class="group-title">實作紀錄</div>
                <div class="menu-item" onclick="navigateTo('cases')">維修案例</div>
            </div>
            <div class="menu-group">
                <div class="group-title">門市資訊</div>
                <div class="menu-item" onclick="navigateTo('locations')">服務站點</div>
            </div>
        </div>
    </nav>

    <main>
        <section id="section-home" class="content-section">
            <div class="empty-state">
                <h2 class="page-header">歡迎來到黑盒子維修中心</h2>
                <p>請從左側選單選擇您需要的服務</p>
            </div>
        </section>

        <section id="section-process" class="content-section">
            <div class="page-container">
                <h2 class="page-header">服務流程</h2>
                <div class="process-tabs">
                    <button class="tab-btn active" onclick="changeProcessImg('phone', this)">手機維修</button>
                    <button class="tab-btn" onclick="changeProcessImg('notebook', this)">筆電維修</button>
                    <button class="tab-btn" onclick="changeProcessImg('data', this)">資料救援</button>
                </div>
                <div class="img-box">
                    <img src="phone process.png" id="img-process-phone" class="display-img active">
                    <img src="notebook process.png" id="img-process-notebook" class="display-img">
                    <img src="data process.png" id="img-process-data" class="display-img">
                </div>
            </div>
        </section>

        <section id="section-prices" class="content-section">
            <div class="page-container">
                <h2 class="page-header">價格查詢</h2>
                
                <div class="diamond-tabs-wrapper">
                    <div class="diamond-row">
                        <div class="diamond-btn active" onclick="changePriceImg('applewatch', this)" title="Apple Watch">
                            <div class="btn-content">
                                <svg viewBox="0 0 24 24">
                                    <path d="M7,5 L17,5 L16,1 L8,1 Z M7,19 L17,19 L16,23 L8,23 Z M5,5 C5,3.9 5.9,3 7,3 L17,3 C18.1,3 19,3.9 19,5 L19,19 C19,20.1 18.1,21 17,21 L7,21 C5.9,21 5,20.1 5,19 Z M6.5,7 C6.5,6.2 7.2,5.5 8,5.5 L16,5.5 C16.8,5.5 17.5,6.2 17.5,7 L17.5,17 C17.5,17.8 16.8,18.5 16,18.5 L8,18.5 C7.2,18.5 6.5,17.8 6.5,17 Z"/>
                                </svg>
                            </div>
                        </div>
                        <div class="diamond-btn" onclick="changePriceImg('memory', this)" title="容量擴充">
                            <div class="btn-content"><i class="fa-solid fa-microchip"></i></div>
                        </div>
                        <div class="diamond-btn" onclick="changePriceImg('switch', this)" title="Switch遊戲機">
                            <div class="btn-content"><i class="fa-solid fa-gamepad"></i></div>
                        </div>
                    </div>
                    <div class="diamond-row bottom">
                        <div class="diamond-btn" onclick="changePriceImg('vacuum', this)" title="吸塵器">
                            <div class="btn-content"><i class="fa-solid fa-wind"></i></div>
                        </div>
                        <div class="diamond-btn" onclick="changePriceImg('hdd', this)" title="硬碟">
                            <div class="btn-content"><i class="fa-solid fa-hdd"></i></div>
                        </div>
                    </div>
                </div>

                <div class="img-box">
                    <img src="Price_applewatch.PNG" id="img-price-applewatch" class="display-img active">
                    <img src="Price_memory.PNG" id="img-price-memory" class="display-img">
                    <img src="" id="img-price-switch" class="display-img">
                    <img src="" id="img-price-vacuum" class="display-img">
                    <img src="" id="img-price-hdd" class="display-img">
                </div>
            </div>
        </section>

        <section id="section-cases" class="content-section">
            <h2 class="page-header">維修案例</h2>
            <div class="empty-state">維修案例文章準備中...</div>
        </section>

        <section id="section-locations" class="content-section">
            <h2 class="page-header">服務站點</h2>
            <div class="empty-state">門市據點載入中...</div>
        </section>
    </main>

    <footer>&copy; 2026 BLACK BOX 維修中心. All Rights Reserved.</footer>

    <script>
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');

        document.getElementById('openMenu').onclick = () => { sidebar.classList.add('active'); overlay.classList.add('active'); };
        document.getElementById('closeMenu').onclick = () => { sidebar.classList.remove('active'); overlay.classList.remove('active'); };
        overlay.onclick = () => { sidebar.classList.remove('active'); overlay.classList.remove('active'); };

        function navigateTo(sectionId) {
            document.querySelectorAll('.content-section').forEach(sec => sec.classList.remove('active'));
            const targetSection = document.getElementById(`section-${sectionId}`);
            if (targetSection) {
                targetSection.classList.add('active');
                window.location.hash = sectionId;
            }
            sidebar.classList.remove('active');
            overlay.classList.remove('active');
            window.scrollTo(0, 0);
        }

        window.addEventListener('DOMContentLoaded', () => {
            const currentHash = window.location.hash.replace('#', '');
            if (currentHash && document.getElementById(`section-${currentHash}`)) {
                navigateTo(currentHash);
            } else {
                navigateTo('home');
            }
        });

        function changeProcessImg(type, btn) {
            document.querySelectorAll('#section-process .tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('#section-process .display-img').forEach(i => i.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById(`img-process-${type}`).classList.add('active');
        }

        function changePriceImg(type, btn) {
            document.querySelectorAll('#section-prices .diamond-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('#section-prices .display-img').forEach(i => i.classList.remove('active'));
            btn.classList.add('active');
            const target = document.getElementById(`img-price-${type}`);
            if (target) target.classList.add('active');
        }
    </script>
</body>
</html>
