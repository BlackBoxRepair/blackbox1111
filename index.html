<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>黑盒子維修中心 - 官方網站</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* --- 核心樣式與顏色定義 --- */
        :root {
            --primary-black: #1a1a1a;
            --secondary-black: #2d2d2d;
            --gold-accent: #d4af37;
            --bg-light: #f9f9f9;
            --text-dark: #333333;
            --text-muted: #999999;
            --shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            --transition: all 0.3s ease;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Noto Sans TC', sans-serif;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--bg-light);
            color: var(--text-dark);
            line-height: 1.6;
        }

        /* --- 上排固定導覽列 (Top Header) --- */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 70px;
            background-color: #ffffff;
            box-shadow: var(--shadow);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 24px;
            z-index: 1000;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .menu-toggle {
            font-size: 24px;
            color: var(--primary-black);
            cursor: pointer;
            background: none;
            border: none;
            padding: 5px;
            transition: var(--transition);
        }
        
        .menu-toggle:hover {
            color: var(--gold-accent);
        }

        .logo-container {
            display: flex;
            align-items: center;
        }

        .logo-img {
            height: 28px;
            width: auto;
            object-fit: contain;
        }

        .header-right {
            display: flex;
            gap: 15px;
        }

        .nav-btn {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background-color: var(--primary-black);
            color: #ffffff;
            text-decoration: none;
            font-size: 18px;
            transition: var(--transition);
            position: relative;
        }

        .nav-btn:hover {
            background-color: var(--gold-accent);
            transform: translateY(-2px);
        }

        .nav-btn::after {
            content: attr(data-tooltip);
            position: absolute;
            bottom: -35px;
            left: 50%;
            transform: translateX(-50%);
            background-color: var(--secondary-black);
            color: #fff;
            font-size: 12px;
            padding: 4px 8px;
            border-radius: 4px;
            white-space: nowrap;
            opacity: 0;
            visibility: hidden;
            transition: var(--transition);
        }

        .nav-btn:hover::after {
            opacity: 1;
            visibility: visible;
        }

        /* --- 側邊展開選單 (森息日常風格) --- */
        .sidebar {
            position: fixed;
            top: 0;
            left: -320px;
            width: 320px;
            height: 100%;
            background-color: #ffffff;
            z-index: 2000;
            transition: var(--transition);
            padding: 24px;
            box-shadow: 5px 0 25px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .sidebar.active {
            left: 0;
        }

        .sidebar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 20px;
            margin-bottom: 20px;
            border-bottom: 1px solid #f0f0f0;
        }

        .sidebar-brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sidebar-logo {
            height: 24px;
            width: auto;
        }

        .close-btn {
            font-size: 20px;
            color: #333333;
            background: none;
            border: none;
            cursor: pointer;
            transition: var(--transition);
            padding: 5px;
        }

        .close-btn:hover {
            color: var(--gold-accent);
        }

        .sidebar-content {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .menu-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .group-title {
            font-size: 13px;
            color: var(--text-muted);
            letter-spacing: 1px;
            margin-bottom: 4px;
            padding-left: 8px;
        }

        .menu-item {
            color: var(--text-dark);
            text-decoration: none;
            font-size: 16px;
            font-weight: 400;
            padding: 8px 8px;
            border-radius: 6px;
            transition: var(--transition);
            display: block;
        }

        .menu-item:hover {
            color: var(--gold-accent);
            background-color: #fcfbf7;
            padding-left: 14px;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.3);
            z-index: 1500;
            display: none;
        }

        .overlay.active {
            display: block;
        }

        /* --- 網頁主要內容區 --- */
        main {
            margin-top: 70px;
            padding: 60px 20px;
            max-width: 1200px;
            margin-left: auto;
            margin-right: auto;
            min-height: calc(100vh - 180px);
        }

        /* --- 🛠 服務流程網頁切換樣式區 --- */
        .process-section {
            background-color: #ffffff;
            border-radius: 16px;
            padding: 40px 30px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(0, 0, 0, 0.02);
            text-align: center;
        }

        .process-title {
            font-size: 26px;
            font-weight: 700;
            color: var(--primary-black);
            margin-bottom: 30px;
            letter-spacing: 1px;
        }

        /* 三個切換按鈕排版 */
        .process-tabs {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .tab-btn {
            background-color: var(--primary-black);
            color: #ffffff;
            border: 2px solid var(--primary-black);
            padding: 12px 30px;
            font-size: 16px;
            font-weight: 500;
            border-radius: 30px;
            cursor: pointer;
            transition: var(--transition);
            letter-spacing: 1px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .tab-btn:hover {
            background-color: var(--secondary-black);
            border-color: var(--secondary-black);
            transform: translateY(-2px);
        }

        /* 啟用狀態的按鈕 (黑底金邊金字) */
        .tab-btn.active {
            background-color: var(--primary-black);
            color: var(--gold-accent);
            border-color: var(--gold-accent);
            font-weight: 700;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.2);
        }

        /* 圖片顯示容器 */
        .process-display {
            max-width: 600px;
            margin: 0 auto;
            position: relative;
        }

        .process-img {
            width: 100%;
            height: auto;
            display: none; /* 預設先隱藏，交由 JS 控制 */
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.4s ease, transform 0.4s ease;
        }

        /* 顯示圖片時的動畫 */
        .process-img.active {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }

        /* 頁尾 */
        footer {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-gray);
            font-size: 14px;
        }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <button class="menu-toggle" id="openMenu" aria-label="開啟選單">
                <i class="fa-solid fa-bars"></i>
            </button>
            <a href="#" class="logo-container">
                <img src="site logo.png" alt="Black Box Logo" class="logo-img">
            </a>
        </div>
        <div class="header-right">
            <a href="https://blackboxrepair.github.io/membership/" class="nav-btn" data-tooltip="會員中心">
                <i class="fa-solid fa-user"></i>
            </a>
            <a href="https://blackboxrepair.github.io/bookingonline/" class="nav-btn" data-tooltip="線上預約">
                <i class="fa-solid fa-calendar-check"></i>
            </a>
        </div>
    </header>

    <div class="overlay" id="overlay"></div>
    <nav class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-brand">
                <img src="site logo.png" alt="Logo" class="sidebar-logo">
            </div>
            <button class="close-btn" id="closeMenu" aria-label="關閉選單">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>
        
        <div class="sidebar-content">
            <div class="menu-group">
                <a href="#" class="menu-item" style="font-weight: 500;">首頁</a>
            </div>

            <div class="menu-group">
                <div class="group-title">服務項目</div>
                <a href="#process" class="menu-item">服務流程</a>
                <a href="#prices" class="menu-item">價格查詢</a>
            </div>

            <div class="menu-group">
                <div class="group-title">實作紀錄</div>
                <a href="#cases" class="menu-item">維修案例</a>
            </div>

            <div class="menu-group">
                <div class="group-title">專屬帳號</div>
                <a href="https://blackboxrepair.github.io/membership/" class="menu-item">會員中心</a>
                <a href="#locations" class="menu-item">服務站點</a>
            </div>
        </div>
    </nav>

    <main>
        
        <section id="process" class="process-section">
            <h2 class="process-title">服務流程</h2>
            
            <div class="process-tabs">
                <button class="tab-btn active" onclick="switchProcess('phone')">手機維修</button>
                <button class="tab-btn" onclick="switchProcess('notebook')">筆電維修</button>
                <button class="tab-btn" onclick="switchProcess('data')">資料救援</button>
            </div>

            <div class="process-display">
                <img src="phone process.png" id="phone-img" alt="手機維修流程" class="process-img active">
                <img src="notebook process.png" id="notebook-img" alt="筆電維修流程" class="process-img">
                <img src="data process.png" id="data-img" alt="資料救援流程" class="process-img">
            </div>
        </section>

    </main>

    <footer>
        <p>&copy; 2026 BLACK BOX 維修中心. All Rights Reserved.</p>
    </footer>

    <script>
        // --- 側邊選單控制 ---
        const openMenuBtn = document.getElementById('openMenu');
        const closeMenuBtn = document.getElementById('closeMenu');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');
        const sidebarLinks = document.querySelectorAll('.sidebar-content a');

        function toggleMenu() {
            sidebar.classList.toggle('active');
            overlay.classList.toggle('active');
        }

        openMenuBtn.addEventListener('click', toggleMenu);
        closeMenuBtn.addEventListener('click', toggleMenu);
        overlay.addEventListener('click', toggleMenu);

        sidebarLinks.forEach(link => {
            link.addEventListener('click', () => {
                sidebar.classList.remove('active');
                overlay.classList.remove('active');
            });
        });

        // --- 🛠 服務流程切換邏輯 ---
        function switchProcess(type) {
            // 1. 移除所有按鈕的 active 狀態
            const buttons = document.querySelectorAll('.tab-btn');
            buttons.forEach(btn => btn.classList.remove('active'));

            // 2. 移除所有圖片的 active 狀態
            const images = document.querySelectorAll('.process-img');
            images.forEach(img => img.classList.remove('active'));

            // 3. 幫當前點擊的按鈕加上 active
            // 透過事件觸發來源找到對應按鈕
            const clickedBtn = event.currentTarget;
            clickedBtn.classList.add('active');

            // 4. 顯示對應的圖片並觸發漸變動畫
            const targetImg = document.getElementById(`${type}-img`);
            targetImg.classList.add('active');
        }
    </script>
</body>
</html>
